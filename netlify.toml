[build]
  base = "justburger-site"
  command = "npm run generate"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm ci && npm run generate"

[context.deploy-preview]
  command = "npm ci && npm run generate"

[context.branch-deploy]
  command = "npm ci && npm run generate"
